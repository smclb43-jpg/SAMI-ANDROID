name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master", "ana" ]

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu cek
        uses: actions/checkout@v4

      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Gradle kur
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: settings.gradle duzelt
        run: |
          if [ -f ayarlar.gradle ]; then mv ayarlar.gradle settings.gradle; fi
          if [ -d uygulama ] && [ ! -d app ]; then mv uygulama app; fi

      - name: Debug APK derle
        run: gradle :app:assembleDebug

      - name: APK yukle
        uses: actions/upload-artifact@v4
        with:
          name: aftem-mobil-istasyon-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
